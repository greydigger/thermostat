# Minimal compile-only stub for CI (PR 1).
# Full application packages added in PR 9–12.

esphome:
  name: thermostat-zone
  friendly_name: Thermostat Zone
  min_version: 2025.5.0

esp32:
  variant: esp32c6
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf
    version: 5.3.2
    platform_version: 6.9.0

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Thermostat-Fallback"
    password: !secret ap_password